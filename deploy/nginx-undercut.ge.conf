# UnderCut production — nginx reverse proxy for undercut.ge
# Install: sudo cp deploy/nginx-undercut.ge.conf /etc/nginx/sites-available/undercut.ge
#          sudo ln -s /etc/nginx/sites-available/undercut.ge /etc/nginx/sites-enabled/
# SSL:     sudo certbot --nginx -d undercut.ge -d www.undercut.ge

upstream undercut_web {
    server 127.0.0.1:3000;
    keepalive 64;
}

# Redirect HTTP → HTTPS (enable after certbot)
server {
    listen 80;
    listen [::]:80;
    server_name undercut.ge www.undercut.ge;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://undercut.ge$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name undercut.ge www.undercut.ge;

    # SSL certificates — replace paths after certbot
    ssl_certificate     /etc/letsencrypt/live/undercut.ge/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/undercut.ge/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Uncomment for HTTP-only testing before SSL:
    # listen 80;
    # listen [::]:80;
    # ssl_certificate off;

    client_max_body_size 10M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location / {
        proxy_pass http://undercut_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    # Optional WebSocket server (uncomment when ws-server is deployed)
    # location /ws/ {
    #     proxy_pass http://127.0.0.1:3001/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    # }
}
